server:
  port: 8080

spring:
  main:
    allow-circular-references: true
  application:
    name: jay-boot
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/jay_boot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 
      database: 0
      timeout: 5000ms

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true

app:
  log:
    request:
      enabled: true
      max-count: 100000
    error:
      enabled: true
      max-count: 50000
  mail:
    enabled: true
    verify-code:
      ttl-seconds: 60
      cooldown-seconds: 60
      hourly-limit: 10
      length: 6
      max-failures-per-hour: 5
    retry:
      max-attempts: 3
      intervals-seconds: [60, 300, 1800]
      scan-size: 100
    security:
      secret-key: "change-me-please-update"

rate-limit:
  enabled: true
  default-qps: 10
  default-burst: 20
  redis-key-prefix: "rate_limit"

distributed-lock:
  enabled: true
  key-prefix: "jay_lock"
  default-wait-time: 0
  default-lease-time: -1
